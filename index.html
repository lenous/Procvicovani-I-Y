<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#5b52e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Y nebo I">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <title>Tvrdé a měkké Y/I</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

    :root {
      --primary: #5b52e8;
      --success: #27ae60;
      --danger:  #e74c3c;
      --safe-top:    env(safe-area-inset-top,    0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      min-height: 100%;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── SCREENS ── */
    .screen { display: none; min-height: 100svh; flex-direction: column; align-items: center; }
    .screen.active { display: flex; }

    .page {
      width: 100%; max-width: 480px;
      padding: 20px 16px 36px;
      display: flex; flex-direction: column; align-items: center;
      gap: 14px; flex: 1;
    }

    /* ── CARD ── */
    .card {
      background: #fff; border-radius: 24px;
      box-shadow: 0 10px 36px rgba(0,0,0,.15);
      padding: 24px 20px; width: 100%;
    }

    /* ── BUTTONS ── */
    button { touch-action: manipulation; font-family: 'Nunito', sans-serif; cursor: pointer; border: none; }

    .btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; min-height: 56px; border-radius: 16px;
      font-size: 1.1rem; font-weight: 900;
      transition: transform .1s;
    }
    .btn:active { transform: scale(.96); }
    .btn-purple {
      background: linear-gradient(135deg, #5b52e8, #9b93ff);
      color: #fff; box-shadow: 0 5px 18px rgba(91,82,232,.4);
    }
    .btn-soft { background: #eeecff; color: var(--primary); }
    .btn-ghost { background: none; color: #fff; font-weight: 800; font-size: 1rem; min-height: 44px; opacity: .9; }

    /* ── INPUT ── */
    .inp {
      width: 100%; padding: 14px 18px;
      border: 2.5px solid #ddd; border-radius: 14px;
      font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700;
      text-align: center; outline: none; transition: border-color .2s;
    }
    .inp:focus { border-color: var(--primary); }

    /* ══════════ WELCOME ══════════ */
    #screen-welcome .page { justify-content: center; padding-top: 12px; }

    .logo { font-size: 68px; }
    .welcome-title { font-size: 1.85rem; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,.2); }
    .welcome-sub   { font-size: .9rem; color: rgba(255,255,255,.75); }

    .diff-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
    .diff-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 14px 6px; min-height: 72px;
      border: 2.5px solid #ddd; border-radius: 16px;
      background: #fff; font-size: .88rem; font-weight: 800;
      transition: border-color .15s, background .15s;
      touch-action: manipulation; cursor: pointer; font-family: 'Nunito', sans-serif;
    }
    .diff-btn:active { transform: scale(.96); }
    .diff-btn .em { font-size: 1.5rem; }
    .diff-btn.on { border-color: var(--primary); background: #eeecff; color: var(--primary); }

    /* ══════════ GAME ══════════ */
    #screen-game .page { padding-top: 12px; gap: 10px; }

    .hdr {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,.18); backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px; padding: 10px 18px; width: 100%; color: #fff;
    }
    .hdr-stat .lbl { font-size: .65rem; opacity: .8; text-transform: uppercase; letter-spacing: .8px; }
    .hdr-stat .val { font-size: 1.35rem; font-weight: 900; line-height: 1.2; }

    .prog-wrap { width: 100%; height: 8px; background: rgba(255,255,255,.25); border-radius: 99px; overflow: hidden; }
    .prog-fill  { height: 100%; background: #ffd43b; border-radius: 99px; transition: width .4s; }

    .game-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }
    .game-actions .btn {
      min-height: 44px;
      border-radius: 12px;
      font-size: .92rem;
    }

    /* question card */
    .q-card { text-align: center; padding: 20px 16px 16px; }

    .q-badge {
      display: inline-block; background: #eeecff; color: var(--primary);
      font-size: .78rem; font-weight: 800; padding: 4px 14px;
      border-radius: 99px; margin-bottom: 10px;
    }

    .q-word {
      font-size: 2.1rem; font-weight: 900; color: #1a1a2e;
      margin-bottom: 4px; line-height: 1.3; word-break: break-word;
    }
    .q-word .gap {
      display: inline-block; min-width: 26px;
      border-bottom: 4px solid var(--primary);
      color: var(--primary); padding: 0 2px;
    }

    .q-sub { font-size: .85rem; color: #bbb; min-height: 16px; margin-bottom: 12px; }

    /* timer */
    .timer-wrap { width: 100%; height: 6px; background: #f0f0f0; border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
    .timer-fill  { height: 100%; border-radius: 99px; transition: background .3s; }

    /* ── 2 TLAČÍTKA PODLE DÉLKY SAMOHLÁSKY ── */
    .yi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 290px;
      margin: 0 auto;
    }

    .yi-btn {
      height: 84px; border-radius: 20px;
      border: 3px solid #e0e0f0;
      font-size: 2.5rem; font-weight: 900;
      background: #fff; color: #222;
      transition: border-color .1s, background .1s;
      touch-action: manipulation;
      font-family: 'Nunito', sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .yi-btn:active:not(:disabled) { transform: scale(.91); }
    .yi-btn.ok  { border-color: var(--success); background: #e8faf0; color: var(--success); }
    .yi-btn.bad { border-color: var(--danger);  background: #fdf0ee; color: var(--danger); }
    .yi-btn:disabled { cursor: default; }

    /* choice buttons */
    .choice-grid { display: grid; gap: 10px; width: 100%; }
    .choice-grid.cols2 { grid-template-columns: 1fr 1fr; }
    .choice-grid.cols1 { grid-template-columns: 1fr; }

    .ch-btn {
      padding: 16px 10px; border: 3px solid #e0e0f0; border-radius: 14px;
      font-size: 1.05rem; font-weight: 800; background: #fff; color: #222;
      min-height: 56px; line-height: 1.3;
      transition: border-color .1s, background .1s; touch-action: manipulation;
      font-family: 'Nunito', sans-serif;
    }
    .ch-btn:active:not(:disabled) { transform: scale(.97); }
    .ch-btn.ok  { border-color: var(--success); background: #e8faf0; color: var(--success); }
    .ch-btn.bad { border-color: var(--danger);  background: #fdf0ee; color: var(--danger); }
    .ch-btn:disabled { cursor: default; }

    .feedback {
      margin-top: 12px; font-size: .9rem; font-weight: 800;
      min-height: 20px; line-height: 1.4;
    }
    .feedback.ok  { color: #1d8348; }
    .feedback.bad { color: #c0392b; }

    .streak-pill {
      display: inline-block; background: linear-gradient(135deg, #ffd43b, #ff922b);
      color: #fff; border-radius: 99px; padding: 4px 14px;
      font-size: .82rem; font-weight: 900; margin-top: 8px;
      opacity: 0; transition: opacity .3s;
    }
    .streak-pill.show { opacity: 1; }

    /* ══════════ RESULT ══════════ */
    #screen-result { background: linear-gradient(160deg, #667eea 0%, #764ba2 100%); }
    #screen-result .page { justify-content: center; gap: 14px; }

    .res-emoji { font-size: 76px; animation: bounce .9s infinite; }
    .res-title { font-size: 2rem; font-weight: 900; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,.2); }
    .res-stars { font-size: 2rem; letter-spacing: 4px; }

    .res-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
    .res-box { background: #fff; border-radius: 18px; padding: 14px 6px; text-align: center; box-shadow: 0 4px 14px rgba(0,0,0,.1); }
    .res-box .v { font-size: 1.85rem; font-weight: 900; color: var(--primary); }
    .res-box .l { font-size: .7rem; color: #999; font-weight: 800; margin-top: 2px; }

    .save-section { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .save-section label { color: rgba(255,255,255,.85); font-weight: 800; font-size: .9rem; }

    .btn-row { display: flex; gap: 10px; width: 100%; }

    /* ══════════ LEADERBOARD ══════════ */
    #screen-leaderboard { background: linear-gradient(160deg, #667eea 0%, #764ba2 100%); }
    #screen-leaderboard .page { padding-top: 16px; }

    .lb-title { font-size: 1.7rem; font-weight: 900; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .lb-sub   { font-size: .88rem; color: rgba(255,255,255,.7); }

    .lb-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .lb-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 16px;
    }
    .lb-row.r1 { background: linear-gradient(135deg, #fff7c0, #ffe566); }
    .lb-row.r2 { background: linear-gradient(135deg, #efefef, #d8d8d8); }
    .lb-row.r3 { background: linear-gradient(135deg, #fce8d5, #f5c59a); }
    .lb-row.rx { background: rgba(255,255,255,.88); }
    .lb-medal { font-size: 1.3rem; min-width: 30px; text-align: center; font-weight: 900; }
    .lb-info  { flex: 1; }
    .lb-name  { font-weight: 800; font-size: .95rem; }
    .lb-meta  { font-size: .7rem; color: #999; font-weight: 700; }
    .lb-pts   { font-weight: 900; font-size: 1.1rem; color: var(--primary); white-space: nowrap; }
    .lb-empty { text-align: center; color: rgba(255,255,255,.55); padding: 28px 0; font-weight: 700; }

    /* ══════════ ANIMACE ══════════ */
    @keyframes popIn  { from{transform:scale(.6);opacity:0} to{transform:scale(1);opacity:1} }
    @keyframes slideUp{ from{transform:translateY(22px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    @keyframes confettiFall { to{transform:translateY(110vh) rotate(720deg);opacity:0} }

    .confetti-piece {
      position: fixed; width: 11px; height: 11px; border-radius: 3px; top: -20px;
      animation: confettiFall linear forwards; z-index: 999; pointer-events: none;
    }

    @media (max-height: 640px) {
      .res-emoji { font-size: 50px; }
      .res-title { font-size: 1.5rem; }
      .yi-btn { height: 70px; font-size: 2rem; }
      .q-word { font-size: 1.7rem; }
    }
    @media (max-width: 360px) {
      .yi-grid { max-width: 260px; }
      .yi-btn { height: 78px; font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<!-- ══════════ WELCOME ══════════ -->
<div id="screen-welcome" class="screen active">
  <div class="page">
    <div class="logo">🦉</div>
    <div class="welcome-title">Y nebo I?</div>
    <div class="welcome-sub">Procvičování Y/I/Ý/Í z více než 700 slov</div>

    <div class="card" style="display:flex;flex-direction:column;gap:14px;">
      <div style="font-weight:800;color:#555;font-size:.9rem;">Vyber obtížnost:</div>
      <div class="diff-grid">
        <button class="diff-btn on" data-diff="easy"   onclick="pickDiff(this)"><span class="em">🐣</span>Lehká</button>
        <button class="diff-btn"    data-diff="medium" onclick="pickDiff(this)"><span class="em">🦊</span>Střední</button>
        <button class="diff-btn"    data-diff="hard"   onclick="pickDiff(this)"><span class="em">🦅</span>Těžká</button>
      </div>
      <button class="btn btn-purple" onclick="startGame()">▶&nbsp; Hrát!</button>
    </div>

    <button class="btn btn-ghost" onclick="goLb()">🏆 Tabulka nejlepších</button>
  </div>
</div>

<!-- ══════════ GAME ══════════ -->
<div id="screen-game" class="screen">
  <div class="page">

    <div class="hdr">
      <div class="hdr-stat"><div class="lbl">Otázka</div><div class="val" id="hdr-q">1/10</div></div>
      <div class="hdr-stat"><div class="lbl">Skóre</div><div class="val" id="hdr-s">0</div></div>
      <div class="hdr-stat"><div class="lbl">Série</div><div class="val" id="hdr-str">🔥0</div></div>
    </div>

    <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>

    <div class="game-actions">
      <button class="btn btn-soft" onclick="resetGame()">↻ Reset hry</button>
      <button class="btn btn-soft" onclick="backToMenu()">← Menu</button>
    </div>

    <div class="card q-card" id="q-card">
      <div class="q-badge" id="q-badge">Doplň písmeno</div>
      <div class="q-word"  id="q-word"></div>
      <div class="q-sub"   id="q-sub"></div>

      <div class="timer-wrap"><div class="timer-fill" id="timer-fill" style="width:100%;background:#43e97b"></div></div>

      <div class="yi-grid" id="yi-row" style="display:none;"></div>

      <!-- výběr ze slov -->
      <div class="choice-grid cols2" id="ch-grid" style="display:none;"></div>

      <div class="feedback" id="fb"></div>
      <div class="streak-pill" id="str-pill"></div>
    </div>

  </div>
</div>

<!-- ══════════ RESULT ══════════ -->
<div id="screen-result" class="screen">
  <div class="page">
    <div class="res-emoji" id="res-emoji">🎉</div>
    <div class="res-title" id="res-title">Skvělé!</div>
    <div class="res-stars" id="res-stars"></div>

    <div class="res-grid">
      <div class="res-box"><div class="v" id="res-pts">0</div><div class="l">Bodů</div></div>
      <div class="res-box"><div class="v" id="res-ok">0</div><div class="l">Správně</div></div>
      <div class="res-box"><div class="v" id="res-str">0</div><div class="l">Max série</div></div>
    </div>

    <div class="save-section">
      <label>Zadej jméno a ulož výsledek:</label>
      <input type="text" class="inp" id="res-name" placeholder="Tvoje jméno…" maxlength="20"
             autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">
      <button class="btn btn-purple" id="btn-save" onclick="saveAndShowLb()">🏆 Uložit do tabulky</button>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" style="flex:1;" onclick="goLb()">Tabulka</button>
      <button class="btn btn-ghost" style="flex:1;" onclick="goHome()">🔄 Hrát znovu</button>
    </div>
  </div>
</div>

<!-- ══════════ LEADERBOARD ══════════ -->
<div id="screen-leaderboard" class="screen">
  <div class="page">
    <div class="lb-title">🏆 Nejlepší hráči</div>
    <div class="lb-sub">Top 10 výsledků v tomto prohlížeči</div>
    <div class="lb-list" id="lb-list"></div>
    <button class="btn btn-purple" onclick="goHome()">← Zpět na úvod</button>
  </div>
</div>

<script src="words.js"></script>
<script>
// ════════════════════════════════════════════════════
//  BANKA OTÁZEK
//  answer: 'y' | 'i' | 'ý' | 'í'
//  type 'yi'     → 4 tlačítka (Y / I / Ý / Í)
//  type 'choice' → výběr ze slov
// ════════════════════════════════════════════════════
const LEGACY_BANK = {

  // ── LEHKÁ: tvrdé a měkké souhlásky ──────────────
  easy: [
    // TVRDÁ → Y (krátké)
    { id:'e0',  type:'yi', blank:'r_ba',     answer:'y',  hint:'R je tvrdá souhláska → Y' },
    { id:'e1',  type:'yi', blank:'k_tka',    answer:'y',  hint:'K je tvrdá souhláska → Y' },

    { id:'e6',  type:'yi', blank:'chod_',    answer:'y',  hint:'CH je tvrdá souhláska → Y' },
    // TVRDÁ → Ý (dlouhé)
    { id:'e7',  type:'yi', blank:'d_m',      answer:'ý',  hint:'D je tvrdá souhláska → Ý' },
    { id:'e8',  type:'yi', blank:'d_ně',     answer:'ý',  hint:'D je tvrdá souhláska → Ý' },
    { id:'e9',  type:'yi', blank:'h_bat',    answer:'ý',  hint:'H je tvrdá souhláska → Ý' },
    { id:'e10', type:'yi', blank:'t_den',    answer:'ý',  hint:'T je tvrdá souhláska → Ý' },
    { id:'e11', type:'yi', blank:'k_vat',    answer:'ý',  hint:'K je tvrdá souhláska → Ý' },
    { id:'e12', type:'yi', blank:'r_č',      answer:'ý',  hint:'R je tvrdá souhláska → Ý' },

    { id:'e13', type:'yi', blank:'š_pka',    answer:'i',  hint:'Š je měkká souhláska → I' },

  // ── STŘEDNÍ: obojetné souhlásky ─────────────────

    // OBOJETNÁ → Y (krátké)

    { id:'m8',  type:'yi', blank:'m_t',      answer:'ý',  hint:'M je obojetná – mýt píšeme s Ý' },

const BANK = createQuestionBank();

// ════════════════════════════════════════
//  ADAPTIVNÍ VÁHY
// ════════════════════════════════════════
function loadW() { try { return JSON.parse(localStorage.getItem('yi_w')||'{}'); } catch { return {}; } }
function saveW(w){ try { localStorage.setItem('yi_w', JSON.stringify(w)); } catch {} }

function bump(id, correct) {
  const w = loadW();
  const c = w[id] || 1;
  w[id] = correct ? Math.max(1, c - 1) : Math.min(12, c + 3);
  saveW(w);
}

function weightedSample(pool, n) {
  const w = loadW();
  const exp = [];
  pool.forEach(q => { const wt = w[q.id]||1; for(let i=0;i<wt;i++) exp.push(q); });
  for (let i = exp.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [exp[i],exp[j]] = [exp[j],exp[i]];
  }
  const seen = new Set(), out = [];
  for (const q of exp) { if(!seen.has(q.id)){seen.add(q.id);out.push(q);if(out.length>=n)break;} }
  for (const q of pool){ if(out.length>=n)break; if(!seen.has(q.id)){seen.add(q.id);out.push(q);} }
  return out;
}

// ════════════════════════════════════════
//  STAV HRY
// ════════════════════════════════════════
const TOTAL  = 15;
const Q_SECS = 10;

let G = {
  diff:'easy', questions:[], qi:0,
  score:0, streak:0, maxStreak:0, correct:0,
  answered:false, tStart:0, raf:null, nextTimer:null, scoreSaved:false
};

// ════════════════════════════════════════
//  WELCOME
// ════════════════════════════════════════
function pickDiff(btn) {
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  G.diff = btn.dataset.diff;
}

function startGame() {
  clearAdvanceTimer();
  G.questions  = weightedSample(BANK[G.diff], TOTAL);
  G.qi=G.score=G.streak=G.maxStreak=G.correct=0;
  G.answered=G.scoreSaved=false;
  go('game'); showQ();
}

function resetGame() {
  startGame();
}

function backToMenu() {
  clearAdvanceTimer();
  stopTimer();
  G.answered = true;
  goHome();
}

// ════════════════════════════════════════
//  OTÁZKA
// ════════════════════════════════════════
function showQ() {
  const q = G.questions[G.qi];
  G.answered = false;
  G.tStart   = Date.now();

  $('hdr-q').textContent   = `${G.qi+1}/${G.questions.length}`;
  $('hdr-s').textContent   = G.score;
  $('hdr-str').textContent = `🔥${G.streak}`;
  $('prog').style.width    = `${G.qi/G.questions.length*100}%`;
  $('fb').textContent      = '';
  $('fb').className        = 'feedback';
  $('str-pill').className  = 'streak-pill';

  if (q.type === 'yi') {
    $('q-badge').textContent = 'Doplň správné písmeno';
    $('q-word').innerHTML    = q.blank.replace(/_/g, '<span class="gap">_</span>');
    $('q-sub').textContent   = '';
    renderYiButtons(q.answer);
    $('yi-row').style.display  = 'grid';
    $('ch-grid').style.display = 'none';
  } else {
    $('q-badge').textContent   = q.q;
    $('q-word').textContent    = '';
    $('q-sub').textContent     = '';
    $('yi-row').style.display  = 'none';
    $('ch-grid').style.display = 'grid';
    $('ch-grid').className     = 'choice-grid '+(q.opts.length>2?'cols1':'cols2');
    $('ch-grid').innerHTML     = '';
    [...q.opts].sort(()=>Math.random()-.5).forEach(o=>{
      const b=document.createElement('button');
      b.className='ch-btn'; b.textContent=o;
      b.onclick=()=>pickChoice(o);
      $('ch-grid').appendChild(b);
    });
  }

  const card=$('q-card');
  card.style.animation='none'; card.offsetHeight;
  card.style.animation='slideUp .25s ease both';
  startTimer();
}

// ── TIMER ──
function startTimer() {
  stopTimer();
  const fill = $('timer-fill');
  fill.style.width='100%'; fill.style.background='#43e97b';
  function tick() {
    const pct = Math.max(0, 1-(Date.now()-G.tStart)/(Q_SECS*1000));
    fill.style.width = (pct*100)+'%';
    fill.style.background = pct>.5?'#43e97b':pct>.25?'#ffd43b':'#e74c3c';
    if (pct<=0 && !G.answered) { timeUp(); return; }
    if (!G.answered) G.raf = requestAnimationFrame(tick);
  }
  G.raf = requestAnimationFrame(tick);
}
function stopTimer() { if(G.raf){cancelAnimationFrame(G.raf);G.raf=null;} }
function clearAdvanceTimer() {
  if (G.nextTimer) {
    clearTimeout(G.nextTimer);
    G.nextTimer = null;
  }
}

function timeUp() {
  if(G.answered) return;
  G.answered=true; stopTimer();
  document.querySelectorAll('.yi-btn,.ch-btn').forEach(b=>b.disabled=true);
  wrong(G.questions[G.qi]);
  queueAdvance(1800);
}

// ── ODPOVĚDI ──
function pick(val) {
  if(G.answered) return;
  G.answered=true; stopTimer();
  const q=G.questions[G.qi];
  const ok=val===q.answer;
  document.querySelectorAll('.yi-btn').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===q.answer) b.classList.add('ok');
    else if(b.dataset.val===val && !ok) b.classList.add('bad');
  });
  ok?right(q):wrong(q);
  queueAdvance(1600);
}

function pickChoice(val) {
  if(G.answered) return;
  G.answered=true; stopTimer();
  const q=G.questions[G.qi];
  const ok=val===q.answer;
  document.querySelectorAll('.ch-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer) b.classList.add('ok');
    else if(b.textContent===val && !ok) b.classList.add('bad');
  });
  ok?right(q):wrong(q);
  queueAdvance(1600);
}

function renderYiButtons(answer) {
  const options = answer === 'ý' || answer === 'í'
    ? [['ý', 'Ý'], ['í', 'Í']]
    : [['y', 'Y'], ['i', 'I']];

  $('yi-row').innerHTML = options.map(([value, label]) => {
    return `<button class="yi-btn" data-val="${value}" onclick="pick('${value}')">${label}</button>`;
  }).join('');
}

function queueAdvance(ms) {
  clearAdvanceTimer();
  G.nextTimer = setTimeout(() => {
    G.nextTimer = null;
    advance();
  }, ms);
}

function right(q) {
  const secs=(Date.now()-G.tStart)/1000;
  const bonus=secs<3?5:secs<6?2:0;
  const streakBonus=G.streak>0?5:0;
  G.score+=10+bonus+streakBonus;
  G.streak++; G.correct++;
  G.maxStreak=Math.max(G.maxStreak,G.streak);
  bump(q.id, true);

  const msgs=['Správně! 🌟','Výborně! 🎉','Přesně tak! ✅','Skvělé! 🚀','Bravo! 🌈'];
  $('fb').textContent=msgs[G.qi%msgs.length]+(bonus?` ⚡+${bonus}`:'');
  $('fb').className='feedback ok';
  if(G.streak>=3){ $('str-pill').textContent=`🔥 Série ${G.streak}× ! +5 bodů navíc`; $('str-pill').className='streak-pill show'; }
  $('hdr-s').textContent=G.score; $('hdr-str').textContent=`🔥${G.streak}`;
  tone('ok');
}

function wrong(q) {
  G.streak=0;
  bump(q.id, false);
  const ans=q.word || q.answer.toUpperCase();
  $('fb').textContent=`✗ Správně: „${ans}" – ${q.hint}`;
  $('fb').className='feedback bad';
  $('hdr-str').textContent='🔥0';
  tone('bad');
}

function advance() {
  clearAdvanceTimer();
  G.qi++;
  G.qi>=G.questions.length?endGame():showQ();
}

// ════════════════════════════════════════
//  VÝSLEDKY
// ════════════════════════════════════════
function endGame() {
  clearAdvanceTimer();
  stopTimer();
  const pct=G.correct/G.questions.length;
  const [emoji,title]=pct>=.9?['🏆','Perfektní!']:pct>=.7?['🌟','Skvělé!']:pct>=.5?['👍','Dobrá práce!']:['📚','Trénuj dál!'];

  $('res-emoji').textContent=emoji;
  $('res-title').textContent=title;
  $('res-stars').textContent=pct>=.9?'⭐⭐⭐':pct>=.6?'⭐⭐':'⭐';
  $('res-ok').textContent=`${G.correct}/${G.questions.length}`;
  $('res-str').textContent=G.maxStreak;
  $('res-pts').textContent='0';
  $('res-name').value='';
  $('btn-save').disabled=false;
  $('btn-save').textContent='🏆 Uložit do tabulky';
  G.scoreSaved=false;

  go('result');
  countUp($('res-pts'),0,G.score,900);
  if(pct>=.7) setTimeout(confetti,350);
}

function countUp(el,from,to,ms) {
  const t0=performance.now();
  function s(now){ const p=Math.min(1,(now-t0)/ms); const e=1-Math.pow(1-p,3); el.textContent=Math.round(from+(to-from)*e); if(p<1)requestAnimationFrame(s); }
  requestAnimationFrame(s);
}

// ════════════════════════════════════════
//  TABULKA
// ════════════════════════════════════════
function getLb(){ try{return JSON.parse(localStorage.getItem('yi_lb')||'[]');}catch{return[];} }
function setLb(lb){ try{localStorage.setItem('yi_lb',JSON.stringify(lb.slice(0,50)));}catch{} }

function saveAndShowLb() {
  if(G.scoreSaved){ goLb(); return; }
  const name=$('res-name').value.trim()||'Hráč';
  const lb=getLb();
  lb.push({ name, score:G.score, correct:G.correct, total:G.questions.length,
             diff:G.diff, date:new Date().toLocaleDateString('cs-CZ') });
  lb.sort((a,b)=>b.score-a.score);
  setLb(lb);
  G.scoreSaved=true;
  $('btn-save').textContent='✓ Uloženo!';
  $('btn-save').disabled=true;
  setTimeout(goLb,600);
}

function renderLb() {
  const lb=getLb();
  const diffs={easy:'🐣 Lehká',medium:'🦊 Střední',hard:'🦅 Těžká'};
  if(!lb.length){ $('lb-list').innerHTML='<div class="lb-empty">Zatím žádné výsledky 🙈<br>Zahraj si první hru!</div>'; return; }
  $('lb-list').innerHTML=lb.slice(0,10).map((e,i)=>{
    const cls=['r1','r2','r3'][i]??'rx';
    const medal=['🥇','🥈','🥉'][i]??`${i+1}.`;
    const mine=G.scoreSaved&&e.score===G.score?' 👈':'';
    return `<div class="lb-row ${cls}">
      <div class="lb-medal">${medal}</div>
      <div class="lb-info"><div class="lb-name">${esc(e.name)}${mine}</div>
      <div class="lb-meta">${diffs[e.diff]||''} · ${e.correct}/${e.total} · ${e.date}</div></div>
      <div class="lb-pts">${e.score} b</div></div>`;
  }).join('');
}

function go(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); $('screen-'+id).classList.add('active'); $('screen-'+id).scrollTop=0; }
function goLb()  { renderLb(); go('leaderboard'); }
function goHome(){ clearAdvanceTimer(); stopTimer(); go('welcome'); }
function $(id)   { return document.getElementById(id); }
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function confetti(){
  const cols=['#5b52e8','#ff6584','#ffd43b','#27ae60','#e67e22','#74c0fc'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${cols[i%cols.length]};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.8}s;transform:rotate(${Math.random()*360}deg);border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    el.addEventListener('animationend',()=>el.remove());
  }
}

let actx;
function tone(type){
  try{
    if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
    const o=actx.createOscillator(),g=actx.createGain();
    o.connect(g);g.connect(actx.destination);
    g.gain.setValueAtTime(.16,actx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.45);
    if(type==='ok'){[523,659,784].forEach((f,i)=>o.frequency.setValueAtTime(f,actx.currentTime+i*.1));}
    else{o.frequency.setValueAtTime(280,actx.currentTime);o.frequency.setValueAtTime(180,actx.currentTime+.15);}
    o.start();o.stop(actx.currentTime+.45);
  }catch{}
}
