<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#6c63ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Y nebo I">
  <meta name="description" content="Procvičování tvrdých a měkkých Y/I pro 2. a 3. třídu">
  <link rel="manifest" href="manifest.json">
  <title>Tvrdé a měkké Y/I</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&display=swap');

    :root {
      --primary: #6c63ff;
      --success: #2ecc71;
      --danger: #e74c3c;
      --warning: #ffd43b;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: var(--safe-top);
    }

    /* ===== WRAPPER ===== */
    #app {
      width: 100%;
      max-width: 480px;
      height: 100dvh;
      height: calc(100vh - var(--safe-top));
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== SCREENS ===== */
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }
    .screen.active { display: flex; }

    .screen-inner {
      width: 100%;
      padding: 20px 16px calc(20px + var(--safe-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
    }

    /* ===== KARTY ===== */
    .card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,.18);
      width: 100%;
      padding: 28px 22px;
    }

    /* ===== TLAČÍTKA ===== */
    button {
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }

    .btn-primary {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #6c63ff, #9c91ff);
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 1.2rem;
      font-weight: 900;
      box-shadow: 0 6px 20px rgba(108,99,255,.4);
      transition: transform .1s, box-shadow .1s;
      min-height: 58px;
    }
    .btn-primary:active { transform: scale(.97); box-shadow: 0 3px 10px rgba(108,99,255,.4); }

    .btn-secondary {
      flex: 1;
      padding: 16px;
      background: #f0eeff;
      color: var(--primary);
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 900;
      min-height: 54px;
      transition: background .1s;
    }
    .btn-secondary:active { background: #ddd9ff; }

    .btn-ghost {
      background: none;
      border: none;
      color: var(--primary);
      font-weight: 700;
      font-size: 1rem;
      padding: 12px;
      min-height: 44px;
    }

    /* ===== UVÍTACÍ OBRAZOVKA ===== */
    #screen-welcome .screen-inner {
      justify-content: center;
      gap: 0;
    }

    .logo { font-size: 72px; text-align: center; margin-bottom: 4px; }

    .welcome-title {
      font-size: 1.9rem;
      font-weight: 900;
      color: white;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,.2);
      margin-bottom: 4px;
    }
    .welcome-sub {
      font-size: .95rem;
      color: rgba(255,255,255,.8);
      text-align: center;
      margin-bottom: 20px;
    }

    .name-input {
      width: 100%;
      padding: 16px 20px;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      font-size: 16px; /* 16px prevents iOS zoom */
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      text-align: center;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 16px;
    }
    .name-input:focus { border-color: var(--primary); }

    .diff-label {
      font-weight: 700;
      color: #555;
      margin-bottom: 10px;
      align-self: flex-start;
      font-size: .95rem;
    }

    .difficulty-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
      width: 100%;
    }

    .diff-btn {
      padding: 14px 8px;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      font-size: .9rem;
      font-weight: 700;
      background: white;
      transition: border-color .15s, background .15s;
      min-height: 72px;
    }
    .diff-btn:active { transform: scale(.97); }
    .diff-btn.selected { border-color: var(--primary); background: #f0eeff; color: var(--primary); }
    .diff-btn span { display: block; font-size: 1.5rem; margin-bottom: 4px; }

    /* ===== HERNÍ OBRAZOVKA ===== */
    #screen-game {
      background: transparent;
      overflow: hidden;
    }
    #screen-game .screen-inner {
      padding: 12px 12px calc(12px + var(--safe-bottom));
      gap: 10px;
      height: 100%;
      overflow-y: auto;
      justify-content: flex-start;
    }

    .game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 18px;
      padding: 10px 18px;
      width: 100%;
      color: white;
    }

    .stat-box { text-align: center; }
    .stat-box .label { font-size: .7rem; opacity: .8; text-transform: uppercase; letter-spacing: .8px; }
    .stat-box .value { font-size: 1.4rem; font-weight: 900; line-height: 1.2; }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--warning);
      border-radius: 99px;
      transition: width .4s;
    }

    .question-card {
      background: white;
      border-radius: 26px;
      padding: 24px 20px 20px;
      width: 100%;
      text-align: center;
      box-shadow: 0 12px 36px rgba(0,0,0,.15);
      animation: slideIn .25s ease;
    }

    .q-badge {
      display: inline-block;
      background: #f0eeff;
      color: var(--primary);
      font-size: .8rem;
      font-weight: 700;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 14px;
    }

    .q-text {
      font-size: 2rem;
      font-weight: 900;
      color: #222;
      margin-bottom: 6px;
      line-height: 1.3;
      word-break: break-word;
    }
    .q-text .blank {
      display: inline-block;
      min-width: 28px;
      border-bottom: 4px solid var(--primary);
      color: var(--primary);
      padding: 0 3px;
    }

    .q-hint {
      font-size: .88rem;
      color: #bbb;
      margin-bottom: 20px;
      min-height: 18px;
    }

    /* Y / I tlačítka */
    .yi-btns { display: flex; gap: 16px; justify-content: center; }
    .yi-btn {
      width: 130px;
      height: 130px;
      border-radius: 24px;
      border: 4px solid #e8e8f0;
      font-size: 3.2rem;
      font-weight: 900;
      background: white;
      color: #333;
      transition: border-color .1s, background .1s, transform .1s;
    }
    .yi-btn:active:not(:disabled) { transform: scale(.93); }
    .yi-btn.correct { border-color: var(--success); background: #efffef; color: #1a6b3c; }
    .yi-btn.wrong   { border-color: var(--danger);  background: #fff0f0; color: #a02020; }

    /* výběr ze slov */
    .answers-grid { display: grid; gap: 10px; width: 100%; }
    .answers-grid.two-col { grid-template-columns: 1fr 1fr; }
    .answers-grid.one-col { grid-template-columns: 1fr; }

    .answer-btn {
      padding: 18px 12px;
      border: 3px solid #e8e8f0;
      border-radius: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      background: white;
      color: #333;
      transition: border-color .1s, background .1s;
      min-height: 58px;
      line-height: 1.3;
    }
    .answer-btn:active:not(:disabled) { transform: scale(.97); }
    .answer-btn.correct { border-color: var(--success); background: #efffef; color: #1a6b3c; }
    .answer-btn.wrong   { border-color: var(--danger);  background: #fff0f0; color: #a02020; }
    .answer-btn:disabled { cursor: default; }

    .feedback-msg {
      margin-top: 14px;
      font-size: .95rem;
      font-weight: 700;
      min-height: 22px;
      line-height: 1.4;
    }
    .feedback-msg.correct { color: #1a6b3c; }
    .feedback-msg.wrong   { color: #a02020; }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      background: linear-gradient(135deg, #ffd43b, #ff922b);
      color: white;
      border-radius: 99px;
      padding: 5px 14px;
      font-size: .85rem;
      font-weight: 900;
      margin-top: 8px;
      opacity: 0;
      transition: opacity .3s;
    }
    .streak-badge.show { opacity: 1; }

    /* ===== VÝSLEDKY ===== */
    #screen-result .screen-inner { justify-content: center; gap: 0; }

    .result-emoji { font-size: 76px; text-align: center; display: block; margin-bottom: 6px; animation: bounce .9s infinite; }
    .result-title { font-size: 2rem; font-weight: 900; color: white; text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,.2); }
    .result-name  { font-size: 1rem; color: rgba(255,255,255,.75); text-align: center; margin-bottom: 20px; }
    .stars        { font-size: 2.2rem; text-align: center; margin-bottom: 16px; }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-bottom: 20px;
    }
    .result-stat {
      background: white;
      border-radius: 18px;
      padding: 16px 8px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.1);
    }
    .result-stat .val { font-size: 1.8rem; font-weight: 900; color: var(--primary); }
    .result-stat .lbl { font-size: .75rem; color: #888; font-weight: 700; }

    .btn-group { display: flex; gap: 12px; width: 100%; }

    /* ===== TABULKA ===== */
    #screen-leaderboard .screen-inner { padding-top: 16px; }

    .lb-header {
      font-size: 1.7rem;
      font-weight: 900;
      color: white;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,.2);
      margin-bottom: 4px;
    }
    .lb-sub { font-size: .9rem; color: rgba(255,255,255,.75); text-align: center; margin-bottom: 18px; }

    .leaderboard-list { width: 100%; margin-bottom: 16px; }

    .lb-item {
      display: flex;
      align-items: center;
      padding: 13px 14px;
      border-radius: 16px;
      margin-bottom: 8px;
      gap: 12px;
    }
    .lb-item.rank-1 { background: linear-gradient(135deg, #fff8d4, #ffe599); }
    .lb-item.rank-2 { background: linear-gradient(135deg, #f2f2f2, #e0e0e0); }
    .lb-item.rank-3 { background: linear-gradient(135deg, #ffeadb, #ffd2b0); }
    .lb-item.rank-other { background: rgba(255,255,255,.9); }

    .lb-rank { font-size: 1.3rem; font-weight: 900; min-width: 30px; text-align: center; }
    .lb-name { flex: 1; font-weight: 700; font-size: .95rem; }
    .lb-score { font-weight: 900; font-size: 1.05rem; color: var(--primary); white-space: nowrap; }
    .lb-diff { font-size: .72rem; color: #999; font-weight: 600; }

    .empty-lb {
      text-align: center;
      color: rgba(255,255,255,.6);
      padding: 32px 0;
      font-size: 1rem;
      font-weight: 600;
    }

    /* ===== ANIMACE ===== */
    @keyframes popIn {
      from { transform: scale(.75); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes slideIn {
      from { transform: translateY(18px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }
    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .confetti-piece {
      position: fixed;
      width: 11px; height: 11px;
      border-radius: 2px;
      top: -20px;
      animation: confettiFall linear forwards;
      z-index: 999;
      pointer-events: none;
    }

    .anim-shake { animation: shake .3s; }
    .anim-pulse { animation: pulse .3s; }

    /* Malé obrazovky */
    @media (max-height: 650px) {
      .logo { font-size: 48px; }
      .welcome-title { font-size: 1.5rem; }
      .yi-btn { width: 100px; height: 100px; font-size: 2.6rem; }
      .q-text { font-size: 1.6rem; }
    }
    @media (max-width: 360px) {
      .yi-btn { width: 110px; height: 110px; }
      .q-text { font-size: 1.7rem; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ===== UVÍTACÍ OBRAZOVKA ===== -->
  <div id="screen-welcome" class="screen active">
    <div class="screen-inner">
      <div class="logo">🦉</div>
      <h1 class="welcome-title">Tvrdé a měkké Y/I</h1>
      <p class="welcome-sub">Procvičování pro 2. a 3. třídu</p>

      <div class="card" style="margin-bottom:16px;">
        <input type="text" class="name-input" id="playerName"
               placeholder="Jak se jmenuješ?" maxlength="20"
               autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false">

        <p class="diff-label">Vyber obtížnost:</p>
        <div class="difficulty-grid">
          <button class="diff-btn selected" data-diff="easy" onclick="selectDiff(this)">
            <span>🐣</span>Lehká
          </button>
          <button class="diff-btn" data-diff="medium" onclick="selectDiff(this)">
            <span>🦊</span>Střední
          </button>
          <button class="diff-btn" data-diff="hard" onclick="selectDiff(this)">
            <span>🦅</span>Těžká
          </button>
        </div>

        <button class="btn-primary" onclick="startGame()">▶&nbsp; Hrát!</button>
      </div>

      <button class="btn-ghost" onclick="showLeaderboard()">🏆 Tabulka nejlepších</button>
    </div>
  </div>

  <!-- ===== HERNÍ OBRAZOVKA ===== -->
  <div id="screen-game" class="screen">
    <div class="screen-inner">
      <div class="game-header">
        <div class="stat-box">
          <div class="label">Otázka</div>
          <div class="value" id="hdr-question">1/10</div>
        </div>
        <div class="stat-box">
          <div class="label">Skóre</div>
          <div class="value" id="hdr-score">0</div>
        </div>
        <div class="stat-box">
          <div class="label">Série</div>
          <div class="value" id="hdr-streak">🔥0</div>
        </div>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>

      <div class="question-card" id="question-card">
        <div class="q-badge" id="q-badge">Doplň Y nebo I</div>
        <div class="q-text" id="q-text"></div>
        <div class="q-hint" id="q-hint"></div>

        <div class="yi-btns" id="yi-btns" style="display:none;">
          <button class="yi-btn" id="btn-y" onclick="answer('y')">Y</button>
          <button class="yi-btn" id="btn-i" onclick="answer('i')">I</button>
        </div>

        <div class="answers-grid two-col" id="choice-btns" style="display:none;"></div>

        <div class="feedback-msg" id="feedback-msg"></div>
        <div class="streak-badge" id="streak-badge"></div>
      </div>
    </div>
  </div>

  <!-- ===== VÝSLEDKY ===== -->
  <div id="screen-result" class="screen">
    <div class="screen-inner" style="justify-content:center;">
      <span class="result-emoji" id="result-emoji">🎉</span>
      <div class="result-title" id="result-title">Skvělé!</div>
      <div class="result-name" id="result-name"></div>
      <div class="stars" id="result-stars"></div>

      <div class="result-stats">
        <div class="result-stat">
          <div class="val" id="res-score">0</div>
          <div class="lbl">Bodů</div>
        </div>
        <div class="result-stat">
          <div class="val" id="res-correct">0</div>
          <div class="lbl">Správně</div>
        </div>
        <div class="result-stat">
          <div class="val" id="res-streak">0</div>
          <div class="lbl">Max série</div>
        </div>
      </div>

      <div class="btn-group" style="margin-bottom:12px;">
        <button class="btn-secondary" onclick="showLeaderboard()">🏆 Tabulka</button>
        <button class="btn-primary" style="flex:1;" onclick="restartGame()">🔄 Znovu</button>
      </div>
    </div>
  </div>

  <!-- ===== TABULKA ===== -->
  <div id="screen-leaderboard" class="screen">
    <div class="screen-inner">
      <div class="lb-header">🏆 Nejlepší hráči</div>
      <div class="lb-sub">Top 10 výsledků</div>
      <div class="leaderboard-list" id="lb-list"></div>
      <button class="btn-primary" onclick="goHome()">← Zpět na úvod</button>
    </div>
  </div>

</div><!-- #app -->

<script>
// ===== OTÁZKY =====
const questions = {
  easy: [
    { type:'yi', blank:'š_pka',   answer:'i', hint:'Š je měkká → I' },
    { type:'yi', blank:'č_st',    answer:'i', hint:'Č je měkká → I' },
    { type:'yi', blank:'ř_kat',   answer:'i', hint:'Ř je měkká → I' },
    { type:'yi', blank:'c_bule',  answer:'i', hint:'C je měkká → I' },
    { type:'yi', blank:'j_st',    answer:'i', hint:'J je měkká → I' },
    { type:'yi', blank:'ž_to',    answer:'i', hint:'Ž je měkká → I' },
    { type:'yi', blank:'r_ba',    answer:'y', hint:'R je tvrdá → Y' },
    { type:'yi', blank:'k_tka',   answer:'y', hint:'K je tvrdá → Y' },
    { type:'yi', blank:'h_ena',   answer:'y', hint:'H je tvrdá → Y' },
    { type:'yi', blank:'d_m',     answer:'y', hint:'D je tvrdá → Y' },
    { type:'yi', blank:'t_kat',   answer:'y', hint:'T je tvrdá → Y' },
    { type:'yi', blank:'n_lon',   answer:'y', hint:'N je tvrdá → Y' },
    { type:'yi', blank:'chod_',   answer:'y', hint:'CH je tvrdá → Y' },
    { type:'yi', blank:'ž_rafa',  answer:'i', hint:'Ž je měkká → I' },
    { type:'yi', blank:'č_ra',    answer:'á', answer:'i', hint:'Č je měkká → I' },
  ],
  medium: [
    { type:'yi', blank:'z_ma',    answer:'i', hint:'Z je obojetná – zima píšeme s I' },
    { type:'yi', blank:'v_tr',    answer:'i', hint:'V je obojetná – vítr píšeme s I' },
    { type:'yi', blank:'m_ška',   answer:'y', hint:'M je obojetná – myška píšeme s Y' },
    { type:'yi', blank:'l_stek',  answer:'i', hint:'L je obojetná – lístek píšeme s I' },
    { type:'yi', blank:'l_že',    answer:'y', hint:'L je obojetná – lyže píšeme s Y' },
    { type:'yi', blank:'s_r',     answer:'y', hint:'S je obojetná – sýr píšeme s Y' },
    { type:'yi', blank:'s_la',    answer:'i', hint:'S je obojetná – síla píšeme s I' },
    { type:'yi', blank:'p_vo',    answer:'i', hint:'P je obojetná – pivo píšeme s I' },
    { type:'yi', blank:'p_ramida',answer:'y', hint:'P je obojetná – pyramida píšeme s Y' },
    { type:'yi', blank:'m_nce',   answer:'i', hint:'M je obojetná – mince píšeme s I' },
    { type:'yi', blank:'b_dlet',  answer:'y', hint:'B je obojetná – bydlet píšeme s Y' },
    { type:'yi', blank:'b_zon',   answer:'i', hint:'B je obojetná – bizon píšeme s I' },
    { type:'choice', question:'Jak se správně píše?', options:['ryby','riby'],   answer:'ryby',  hint:'R je tvrdá souhláska' },
    { type:'choice', question:'Jak se správně píše?', options:['šipka','šypka'], answer:'šipka', hint:'Š je měkká souhláska' },
    { type:'choice', question:'Jak se správně píše?', options:['číst','čyst'],   answer:'číst',  hint:'Č je měkká souhláska' },
    { type:'choice', question:'Jak se správně píše?', options:['kytka','kitka'], answer:'kytka', hint:'K je tvrdá souhláska' },
    { type:'choice', question:'Jak se správně píše?', options:['žirafa','žyrafa'],answer:'žirafa',hint:'Ž je měkká souhláska' },
  ],
  hard: [
    { type:'choice', question:'Jak se správně píše?', options:['příroda','přyroda'],   answer:'příroda',  hint:'Ř je měkká → I' },
    { type:'choice', question:'Jak se správně píše?', options:['výběr','víběr'],       answer:'výběr',    hint:'V je obojetná – výběr s Y' },
    { type:'choice', question:'Jak se správně píše?', options:['silnice','sylnice'],   answer:'silnice',  hint:'S je obojetná – silnice s I' },
    { type:'choice', question:'Jak se správně píše?', options:['kyslík','kislík'],     answer:'kyslík',   hint:'K je tvrdá → Y' },
    { type:'choice', question:'Jak se správně píše?', options:['rytmus','ritmus'],     answer:'rytmus',   hint:'R je tvrdá → Y' },
    { type:'choice', question:'Jak se správně píše?', options:['cizinec','cyzinec'],   answer:'cizinec',  hint:'C je měkká → I' },
    { type:'choice', question:'Jak se správně píše?', options:['bylinka','bilinka'],   answer:'bylinka',  hint:'B je obojetná – bylinka s Y' },
    { type:'choice', question:'Jak se správně píše?', options:['písek','pysek'],       answer:'písek',    hint:'P je obojetná – písek s I' },
    { type:'choice', question:'Jak se správně píše?', options:['vysílat','visylat'],   answer:'vysílat',  hint:'V obojetná Y, S obojetná í' },
    { type:'choice', question:'Vyber správnou větu',  options:['Ryby mají šupiny.','Riby mají šupiny.'], answer:'Ryby mají šupiny.', hint:'R je tvrdá souhláska' },
    { type:'choice', question:'Vyber správnou větu',  options:['Čítal jsem knížku.','Čytal jsem knížku.'], answer:'Čítal jsem knížku.', hint:'Č je měkká souhláska' },
    { type:'choice', question:'Vyber správnou větu',  options:['Šel jsem na výlet.','Šel jsem na vilet.'], answer:'Šel jsem na výlet.', hint:'V obojetná – výlet s Y' },
    { type:'choice', question:'Vyber správnou větu',  options:['Myška má dlouhý ocas.','Miška má dlouhý ocas.'], answer:'Myška má dlouhý ocas.', hint:'M je obojetná – myška s Y' },
    { type:'choice', question:'Jak se správně píše?', options:['kobylka','kobilka'],   answer:'kobylka',  hint:'B je obojetná – kobylka s Y' },
    { type:'choice', question:'Jak se správně píše?', options:['fyzika','fizika'],     answer:'fyzika',   hint:'F je obojetná – fyzika s Y' },
  ]
};

const QUESTIONS_PER_GAME = 10;
const BASE_PTS   = 10;
const STREAK_PTS = 5;
const FAST_PTS   = 3;

let state = {
  playerName: '',
  difficulty: 'easy',
  currentQ: 0,
  score: 0,
  streak: 0,
  maxStreak: 0,
  correct: 0,
  gameQuestions: [],
  answered: false,
  questionStart: 0,
};

// ===== VÝBĚR OBTÍŽNOSTI =====
function selectDiff(btn) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state.difficulty = btn.dataset.diff;
}

// ===== ZAČÁTEK HRY =====
function startGame() {
  state.playerName = document.getElementById('playerName').value.trim() || 'Hráč';

  const pool = questions[state.difficulty].filter(q => {
    // oprava dat – odstraň chybný záznam z easy (překlep v generátoru)
    return q.answer === 'y' || q.answer === 'i' || q.type === 'choice';
  });

  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  state.gameQuestions = pool.slice(0, QUESTIONS_PER_GAME);
  state.currentQ = state.score = state.streak = state.maxStreak = state.correct = 0;
  state.answered = false;

  showScreen('game');
  renderQuestion();
}

// ===== VYKRESLENÍ OTÁZKY =====
function renderQuestion() {
  const q = state.gameQuestions[state.currentQ];
  state.answered = false;
  state.questionStart = Date.now();

  document.getElementById('hdr-question').textContent = `${state.currentQ + 1}/${state.gameQuestions.length}`;
  document.getElementById('hdr-score').textContent = state.score;
  document.getElementById('hdr-streak').textContent = `🔥${state.streak}`;
  document.getElementById('progress-fill').style.width =
    `${(state.currentQ / state.gameQuestions.length) * 100}%`;

  document.getElementById('feedback-msg').textContent = '';
  document.getElementById('feedback-msg').className = 'feedback-msg';
  document.getElementById('streak-badge').className = 'streak-badge';

  const yiBtns     = document.getElementById('yi-btns');
  const choiceBtns = document.getElementById('choice-btns');
  const btnY = document.getElementById('btn-y');
  const btnI = document.getElementById('btn-i');

  btnY.className = 'yi-btn'; btnY.disabled = false;
  btnI.className = 'yi-btn'; btnI.disabled = false;

  if (q.type === 'yi') {
    document.getElementById('q-badge').textContent = 'Doplň Y nebo I';
    document.getElementById('q-text').innerHTML = formatBlank(q.blank);
    document.getElementById('q-hint').textContent = '';
    yiBtns.style.display = 'flex';
    choiceBtns.style.display = 'none';
  } else {
    document.getElementById('q-badge').textContent = q.question;
    document.getElementById('q-text').textContent = '';
    document.getElementById('q-hint').textContent = '';
    yiBtns.style.display = 'none';
    choiceBtns.style.display = 'grid';
    choiceBtns.className = 'answers-grid ' + (q.options.length === 2 ? 'two-col' : 'one-col');

    choiceBtns.innerHTML = '';
    [...q.options].sort(() => Math.random() - .5).forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'answer-btn';
      btn.textContent = opt;
      btn.onclick = () => answerChoice(opt);
      choiceBtns.appendChild(btn);
    });
  }

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = 'slideIn .25s ease';
}

function formatBlank(blank) {
  return blank.replace(/_/g, '<span class="blank">_</span>');
}

// ===== ODPOVĚDI =====
function answer(choice) {
  if (state.answered) return;
  state.answered = true;
  const q = state.gameQuestions[state.currentQ];
  const correct = choice === q.answer;
  const fast = (Date.now() - state.questionStart) < 4000;

  const btnY = document.getElementById('btn-y');
  const btnI = document.getElementById('btn-i');
  btnY.disabled = true;
  btnI.disabled = true;

  const chosen = choice === 'y' ? btnY : btnI;
  chosen.classList.add(correct ? 'correct' : 'wrong');
  if (!correct) {
    const other = choice === 'y' ? btnI : btnY;
    other.classList.add('correct');
  }

  processAnswer(correct, fast, q);
}

function answerChoice(choice) {
  if (state.answered) return;
  state.answered = true;
  const q = state.gameQuestions[state.currentQ];
  const correct = choice === q.answer;
  const fast = (Date.now() - state.questionStart) < 5000;

  document.getElementById('choice-btns').querySelectorAll('.answer-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.answer) b.classList.add('correct');
    else if (b.textContent === choice && !correct) b.classList.add('wrong');
  });

  processAnswer(correct, fast, q);
}

function processAnswer(correct, fast, q) {
  const fb = document.getElementById('feedback-msg');

  if (correct) {
    state.correct++;
    state.streak++;
    state.maxStreak = Math.max(state.maxStreak, state.streak);

    let pts = BASE_PTS;
    if (state.streak > 1) pts += STREAK_PTS;
    if (fast) pts += FAST_PTS;
    state.score += pts;

    const msgs = ['Správně! 🌟','Výborně! 🎉','Přesně tak! ✅','Skvělé! 🚀','Bravo! 🌈'];
    fb.textContent = msgs[Math.floor(Math.random() * msgs.length)];
    fb.className = 'feedback-msg correct';

    if (state.streak >= 3) {
      const sb = document.getElementById('streak-badge');
      sb.textContent = `🔥 Série ${state.streak}× +${STREAK_PTS} bodů navíc!`;
      sb.className = 'streak-badge show';
    }
    playSound('correct');
  } else {
    state.streak = 0;
    fb.textContent = `✗ Správně: ${q.answer?.toUpperCase() ?? q.answer} – ${q.hint}`;
    fb.className = 'feedback-msg wrong';
    playSound('wrong');
  }

  document.getElementById('hdr-score').textContent = state.score;
  document.getElementById('hdr-streak').textContent = `🔥${state.streak}`;
  setTimeout(nextQuestion, 1700);
}

function nextQuestion() {
  state.currentQ++;
  state.currentQ >= state.gameQuestions.length ? endGame() : renderQuestion();
}

// ===== KONEC HRY =====
function endGame() {
  saveScore();
  const pct = state.correct / state.gameQuestions.length;

  const [emoji, title] =
    pct >= .9 ? ['🏆','Perfektní!'] :
    pct >= .7 ? ['🌟','Skvělé!']    :
    pct >= .5 ? ['👍','Dobrá práce!'] :
               ['📚','Trénuj dál!'];

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-name').textContent  = state.playerName;
  document.getElementById('res-score').textContent    = state.score;
  document.getElementById('res-correct').textContent  = `${state.correct}/${state.gameQuestions.length}`;
  document.getElementById('res-streak').textContent   = state.maxStreak;
  document.getElementById('result-stars').textContent = pct >= .9 ? '⭐⭐⭐' : pct >= .6 ? '⭐⭐' : '⭐';

  showScreen('result');
  if (pct >= .7) launchConfetti();
}

// ===== TABULKA =====
function saveScore() {
  const lb = getLeaderboard();
  lb.push({
    name: state.playerName,
    score: state.score,
    correct: state.correct,
    total: state.gameQuestions.length,
    difficulty: state.difficulty,
    date: new Date().toLocaleDateString('cs-CZ'),
  });
  lb.sort((a, b) => b.score - a.score);
  try { localStorage.setItem('yi_lb', JSON.stringify(lb.slice(0, 50))); } catch {}
}

function getLeaderboard() {
  try { return JSON.parse(localStorage.getItem('yi_lb') || '[]'); } catch { return []; }
}

function showLeaderboard() {
  const lb = getLeaderboard();
  const list = document.getElementById('lb-list');

  if (!lb.length) {
    list.innerHTML = '<div class="empty-lb">Zatím žádné výsledky 🙈<br>Zahraj si první hru!</div>';
  } else {
    list.innerHTML = lb.slice(0, 10).map((e, i) => {
      const cls    = ['rank-1','rank-2','rank-3'][i] ?? 'rank-other';
      const medal  = ['🥇','🥈','🥉'][i] ?? `${i+1}.`;
      const diff   = {easy:'🐣 Lehká', medium:'🦊 Střední', hard:'🦅 Těžká'}[e.difficulty] ?? '';
      return `<div class="lb-item ${cls}">
        <div class="lb-rank">${medal}</div>
        <div>
          <div class="lb-name">${escHtml(e.name)}</div>
          <div class="lb-diff">${diff} · ${e.correct}/${e.total} · ${e.date}</div>
        </div>
        <div class="lb-score">${e.score} b</div>
      </div>`;
    }).join('');
  }
  showScreen('leaderboard');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== NAVIGACE =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${id}`).classList.add('active');
}
function goHome()      { showScreen('welcome'); }
function restartGame() { showScreen('welcome'); }

// ===== KONFETY =====
function launchConfetti() {
  const colors = ['#6c63ff','#ff6584','#ffd43b','#43e97b','#ff922b','#74c0fc'];
  for (let i = 0; i < 55; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `left:${Math.random()*100}vw;background:${colors[i%colors.length]};
      animation-duration:${Math.random()*2+1.4}s;animation-delay:${Math.random()*.7}s;
      transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
}

// ===== ZVUKY =====
let audioCtx;
function playSound(type) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    gain.gain.setValueAtTime(.18, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + .4);
    if (type === 'correct') {
      [523,659,784].forEach((f,i) => osc.frequency.setValueAtTime(f, audioCtx.currentTime + i*.1));
    } else {
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.setValueAtTime(200, audioCtx.currentTime + .15);
    }
    osc.start(); osc.stop(audioCtx.currentTime + .4);
  } catch {}
}
</script>
